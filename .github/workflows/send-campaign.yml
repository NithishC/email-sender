name: Send Campaign Emails

on:
  schedule:
    # Run weekdays at 9:17 AM CST (15:17 UTC)
    # Using minute 17 to avoid high-load times at start of hour
    - cron: '17 15 * * 1-5'

  # Allow manual triggers from GitHub Actions UI
  workflow_dispatch:

jobs:
  send-emails:
    runs-on: ubuntu-latest
    environment: email-sender  # Uses secrets from this GitHub environment
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Download resume from Google Drive
        run: |
          mkdir -p temp
          curl -L "https://drive.google.com/uc?export=download&id=${{ secrets.RESUME_GDRIVE_ID }}" -o temp/Resume.pdf
          echo "Resume downloaded: $(ls -la temp/Resume.pdf)"

      - name: Send approved emails
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          DAILY_LIMIT: ${{ secrets.DAILY_LIMIT }}
          FOLLOW_UP_INTERVALS: '3,7,10'
          MAX_FOLLOW_UPS: '3'
        run: npm run send
