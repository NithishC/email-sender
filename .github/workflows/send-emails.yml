name: Cold Email Campaign

on:
  schedule:
    # Run daily at 9 AM EST (14:00 UTC)
    # Cron: minute hour day-of-month month day-of-week
    - cron: '0 14 * * *'

  # Allow manual triggers from GitHub Actions UI
  workflow_dispatch:

permissions:
  contents: write # Needed to commit tracking.csv updates

jobs:
  send-emails:
    runs-on: ubuntu-latest
    environment: email-sender  # Uses secrets from this GitHub environment

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run campaign
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          DAILY_LIMIT: '50'
          FOLLOW_UP_INTERVALS: '3,7'
          MAX_FOLLOW_UPS: '2'
        run: npm run campaign

      - name: Commit tracking updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/tracking.csv
          git diff --staged --quiet || git commit -m "Update email tracking [skip ci]"
          git push
